name: Gradle Package (Development)

on:
    workflow_dispatch:
        inputs:
            run-build-scan:
                description: 'Run with public build scan (adds --scan)'
                required: true
                type: boolean
                default: false
            publish-artifacts:
                description: 'Upload to Modrinth & API? (Uncheck for a dry run)'
                type: boolean
                default: true
    push:
        branches:
            - 'main'
            - '2.0'
            - 'dev'
            - 'release'
            - 'release/**'
        paths:
            - '.github/workflows/**'
            - 'buildSrc/**'
            - 'bukkit/**'
            - 'common/**'
            - 'fabric/**'
            - '**.java'
            - '**.kt'
            - '**.kts'
            - '**.toml'
jobs:
    call-build-workflow:
        # Only publish on pushes to the main repo, not on forks
        if: github.event_name != 'pull_request' && github.repository == 'GrimAnticheat/Grim'
        uses: ./.github/workflows/build-and-publish.yml
        with:
            is-release-build: false
            release-version-type: alpha # Dev builds are always 'alpha'
            # If triggered by push, github.event.inputs.run-build-scan is null, so it uses the fallback 'false'.
            # If triggered manually, it uses the value from the checkbox.
            run-build-scan: ${{ github.event.inputs.run-build-scan || false }}

            # This logic is already correct and handles both cases.
            publish-artifacts: ${{ github.event.inputs.publish-artifacts != 'false' }}
        secrets:
            MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
            BUILD_UPDATE_TOKEN: ${{ secrets.BUILD_UPDATE_TOKEN }}
            BUILD_UPDATE_URL: ${{ secrets.BUILD_UPDATE_URL }}
