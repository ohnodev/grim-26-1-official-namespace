name: Gradle Package (Development)

on:
    workflow_dispatch:
    push:
        branches:
            - 'main'
            - '2.0'
            - 'dev'
            - 'release'
            - 'release/**'
        paths:
            - 'buildSrc/**'
            - 'bukkit/**'
            - 'common/**'
            - 'fabric/**'
            - '**.java'
            - '**.kt'
            - '**.kts'
            - '**.toml'

jobs:
    call-build-workflow:
        # Only publish on pushes to the main repo, not on forks
        if: github.event_name != 'pull_request' && github.repository == 'GrimAnticheat/Grim'
        uses: ./.github/workflows/build-and-publish.yml
        with:
            is-release-build: false
            release-version-type: alpha # Dev builds are always 'alpha'
        secrets:
            MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
            BUILD_UPDATE_TOKEN: ${{ secrets.BUILD_UPDATE_TOKEN }}
            BUILD_UPDATE_URL: ${{ secrets.BUILD_UPDATE_URL }}
