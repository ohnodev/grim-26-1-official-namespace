# For help with webhooks: https://support.discord.com/hc/en-us/articles/228383668
enabled: false
webhook: ""
embed-title: "**Grim Alert**"
embed-color: "#00FFFF"
include-timestamp: true
# Character used to replace backticks inside code spans (` `).
# Discord doesn't support escaping inside code spans, so backticks in values
# (e.g. a brand name containing `) are replaced with this character.
# Set to "`" to disable replacement (backticks will break code span formatting).
backtick-replacement-char: "ˋ" # Defaults to U+02CB
# %player% and %brand% are wrapped in backticks (`) to prevent special characters from breaking formatting.
violation-content:
    - "**Player**: `%player%`"
    - "**Check**: %check%"
    - "**Violations**: %violations%"
    - "**Client Version**: %version%"
    - "**Brand**: `%brand%`"
    - "**Ping**: %ping%"
    - "**TPS**: %tps%"
